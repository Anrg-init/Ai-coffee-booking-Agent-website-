<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brûlée — CoffeeLikeNever</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="admin.css">
  
</head>
<body>

<!-- ── HEADER ── -->
<header>
  <a class="header-logo" href="index.html">Brû<span>lée</span></a>
  <div class="header-right">
    <p>Admin Panel</p>
    <a class="btn-back" href="index.html">← Back to Site</a>
  </div>
</header>

<!-- ── MAIN ── -->
<div class="container">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="switchTab('book')">New Booking</button>
    <button class="tab" onclick="switchTab('bookings')">All Bookings</button>
  </div>

  <!-- ── TAB: New Booking ── -->
  <div class="tab-content active" id="tab-book">
    <div class="form-card">
      <h2>New Booking</h2>
      <p>Fill in the details below to place a manual order.</p>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Customer Name *</label>
          <input class="form-control" id="f-name" type="text" placeholder="e.g. Anurag"/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone *</label>
          <input class="form-control" id="f-phone" type="tel" placeholder="e.g. 9876543210"/>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Coffee *</label>
          <select class="form-select" id="f-coffee" onchange="calcPrice()">
            <option value="">Select coffee…</option>
            <option>Espresso</option>
            <option>Cappuccino</option>
            <option>Latte</option>
            <option>Americano</option>
            <option>Mocha</option>
            <option>Cold Coffee</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Size *</label>
          <select class="form-select" id="f-size" onchange="calcPrice()">
            <option value="">Select size…</option>
            <option>Small</option>
            <option>Regular</option>
            <option>Medium</option>
            <option>Large</option>
            <option>Extra Large</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Quantity *</label>
          <select class="form-select" id="f-qty" onchange="calcPrice()">
            <option value="">Select…</option>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
            <option>5</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Pickup Time *</label>
          <select class="form-select" id="f-time">
            <option value="">Select time…</option>
            <option>9:00 AM</option>
            <option>10:00 AM</option>
            <option>11:00 AM</option>
            <option>12:00 PM</option>
            <option>2:00 PM</option>
            <option>4:00 PM</option>
            <option>6:00 PM</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Total Price</label>
        <div class="price-display" id="price-display">— Select coffee, size & quantity</div>
      </div>

      <button class="btn-submit" onclick="submitBooking()">Confirm Booking</button>
    </div>
  </div>

  <!-- ── TAB: All Bookings ── -->
  <div class="tab-content" id="tab-bookings">
    <div class="table-header">
      <div>
        <h2>All Bookings <span class="badge-count" id="booking-count">0</span></h2>
      </div>
      <button class="btn-refresh" onclick="loadBookings()">↻ Refresh</button>
    </div>

    <div class="table-wrap">
      <div id="bookings-loading">Loading bookings…</div>
      <div id="bookings-empty" style="display:none">
        <div class="icon">📋</div>
        <p>No bookings yet.</p>
      </div>
      <table id="bookings-table" style="display:none">
        <thead>
          <tr>
            <th>#</th>
            <th>Customer</th>
            <th>Phone</th>
            <th>Coffee</th>
            <th>Size</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Pickup</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="bookings-body"></tbody>
      </table>
    </div>
  </div>

</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const API = 'http://127.0.0.1:8000';

  const PRICES = {
    "Espresso":    {"Small":3.0,"Regular":3.5,"Medium":4.0,"Large":4.5,"Extra Large":5.0},
    "Cappuccino":  {"Small":3.5,"Regular":4.0,"Medium":4.5,"Large":5.0,"Extra Large":5.5},
    "Latte":       {"Small":4.0,"Regular":4.5,"Medium":5.0,"Large":5.5,"Extra Large":6.0},
    "Americano":   {"Small":3.0,"Regular":3.5,"Medium":4.0,"Large":4.5,"Extra Large":5.0},
    "Mocha":       {"Small":4.5,"Regular":5.0,"Medium":5.5,"Large":6.0,"Extra Large":6.5},
    "Cold Coffee": {"Small":4.0,"Regular":4.5,"Medium":5.0,"Large":5.5,"Extra Large":6.0},
  };

  // ── Tabs ──
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['book','bookings'][i] === name));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'bookings') loadBookings();
  }

  // ── Price calculator ──
  function calcPrice() {
    const coffee = document.getElementById('f-coffee').value;
    const size   = document.getElementById('f-size').value;
    const qty    = parseInt(document.getElementById('f-qty').value) || 0;
    if (coffee && size && qty) {
      const unit  = PRICES[coffee]?.[size] || 0;
      const total = (unit * qty).toFixed(2);
      document.getElementById('price-display').textContent = `$${total}`;
    } else {
      document.getElementById('price-display').textContent = '— Select coffee, size & quantity';
    }
  }

  // ── Submit booking ──
  async function submitBooking() {
    const name   = document.getElementById('f-name').value.trim();
    const phone  = document.getElementById('f-phone').value.trim();
    const coffee = document.getElementById('f-coffee').value;
    const size   = document.getElementById('f-size').value;
    const qty    = parseInt(document.getElementById('f-qty').value);
    const time   = document.getElementById('f-time').value;

    if (!name || !phone || !coffee || !size || !qty || !time) {
      showToast('Please fill in all fields.', true); return;
    }

    const unit  = PRICES[coffee]?.[size] || 0;
    const price = parseFloat((unit * qty).toFixed(2));

    try {
      const res = await fetch(`${API}/bookings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          customer_name: name,
          phone, coffee_name: coffee,
          size, quantity: qty,
          price, pickup_time: time
        })
      });
      if (!res.ok) throw new Error();
      showToast('Booking confirmed! ☕');
      clearForm();
    } catch {
      showToast('Failed to create booking. Check backend.', true);
    }
  }

  function clearForm() {
    ['f-name','f-phone'].forEach(id => document.getElementById(id).value = '');
    ['f-coffee','f-size','f-qty','f-time'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('price-display').textContent = '— Select coffee, size & quantity';
  }

  // ── Load bookings ──
  async function loadBookings() {
    document.getElementById('bookings-loading').style.display = 'block';
    document.getElementById('bookings-table').style.display = 'none';
    document.getElementById('bookings-empty').style.display = 'none';

    try {
      const res = await fetch(`${API}/bookings`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      document.getElementById('bookings-loading').style.display = 'none';
      document.getElementById('booking-count').textContent = data.length;

      if (!data.length) {
        document.getElementById('bookings-empty').style.display = 'block'; return;
      }

      document.getElementById('bookings-table').style.display = 'table';
      document.getElementById('bookings-body').innerHTML = data.map(b => `
        <tr id="row-${b.id}">
          <td style="color:var(--muted);font-size:.78rem">${b.id}</td>
          <td style="font-weight:500">${esc(b.customer_name)}</td>
          <td style="color:var(--muted)">${esc(b.phone)}</td>
          <td>${esc(b.coffee_name)}</td>
          <td>${esc(b.size)}</td>
          <td>${b.quantity}</td>
          <td style="font-weight:500;color:var(--roast)">$${parseFloat(b.price).toFixed(2)}</td>
          <td>${esc(b.pickup_time)}</td>
          <td>
            <select class="status-select" onchange="updateStatus(${b.id}, this.value)">
              <option ${b.status==='pending'?'selected':''}>pending</option>
              <option ${b.status==='confirmed'?'selected':''}>confirmed</option>
              <option ${b.status==='completed'?'selected':''}>completed</option>
            </select>
          </td>
          <td>
            <button class="btn-delete" onclick="deleteBooking(${b.id})">Delete</button>
          </td>
        </tr>
      `).join('');
    } catch {
      document.getElementById('bookings-loading').textContent = '⚠ Could not connect to backend.';
    }
  }

  // ── Update status ──
  async function updateStatus(id, status) {
    try {
      const res = await fetch(`${API}/bookings/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
      });
      if (!res.ok) throw new Error();
      showToast(`Status updated to ${status}.`);
    } catch {
      showToast('Failed to update status.', true);
    }
  }

  // ── Delete ──
  async function deleteBooking(id) {
    if (!confirm('Delete this booking?')) return;
    try {
      const res = await fetch(`${API}/bookings/${id}`, { method: 'DELETE' });
      if (!res.ok) throw new Error();
      document.getElementById('row-' + id)?.remove();
      showToast('Booking deleted.');
      const count = document.querySelectorAll('#bookings-body tr').length;
      document.getElementById('booking-count').textContent = count;
      if (!count) {
        document.getElementById('bookings-table').style.display = 'none';
        document.getElementById('bookings-empty').style.display = 'block';
      }
    } catch {
      showToast('Failed to delete.', true);
    }
  }

  // ── Toast ──
  function showToast(msg, isError = false) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = isError ? 'error' : '';
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
</html>
